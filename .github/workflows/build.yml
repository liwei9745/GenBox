name: Build Desktop Clients

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_all:
        description: 'Build all platforms'
        required: false
        default: 'true'
        type: boolean

env:
  APP_NAME: GenBox
  PYTHON_VERSION: '3.11'

jobs:
  # ──────────────────────────────────────────────────────────────
  # Windows Build
  # ──────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller psutil requests

      - name: Build with PyInstaller
        run: python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Windows-x64
          path: dist/${{ env.APP_NAME }}.exe
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # macOS Build
  # ──────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller psutil requests

      - name: Build with PyInstaller
        run: python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macOS
          path: dist/${{ env.APP_NAME }}
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Linux Build
  # ──────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller psutil requests

      - name: Build with PyInstaller
        run: python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Linux-x64
          path: dist/${{ env.APP_NAME }}
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Create Release
  # ──────────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Windows-x64
          path: artifacts/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macOS
          path: artifacts/macos

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Linux-x64
          path: artifacts/linux

      - name: List artifacts
        run: find artifacts -type f

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create release
          RELEASE_ID=$(gh release create "${{ github.ref_name }}" \
            --title "${{ env.APP_NAME }} ${{ github.ref_name }}" \
            --notes "${{ env.APP_NAME }} ${{ github.ref_name }} - Cross-platform desktop client" \
            --draft=false \
            --prerelease=false \
            artifacts/windows/${{ env.APP_NAME }}.exe#"${{ env.APP_NAME }}-Windows-x64.exe" \
            artifacts/macos/${{ env.APP_NAME }}#"${{ env.APP_NAME }}-macOS" \
            artifacts/linux/${{ env.APP_NAME }}#"${{ env.APP_NAME }}-Linux-x64")
          echo "Release created: $RELEASE_ID"
