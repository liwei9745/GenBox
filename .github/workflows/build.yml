name: Build Desktop Clients

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_all:
        description: 'Build all platforms'
        required: false
        default: 'true'
        type: boolean

env:
  APP_NAME: GenBox
  PYTHON_VERSION: '3.12'

jobs:
  quality:
    name: Test release source
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Validate JavaScript
        run: |
          node --check static/js/i18n.js
          node --check static/js/app-all.js
          node --check static/js/extensions.js
          node --check static/js/sync.js

      - name: Run tests
        run: python -m pytest -q

  # ──────────────────────────────────────────────────────────────
  # Windows Build
  # ──────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    needs: quality
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Build with PyInstaller
        run: python build.py

      - name: Smoke test packaged client
        run: python scripts/smoke_client.py --executable dist/GenBox.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Windows-x64
          path: dist/${{ env.APP_NAME }}.exe
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # macOS Build
  # ──────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS
    needs: quality
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Build with PyInstaller
        run: python build.py

      - name: Smoke test packaged client
        run: python scripts/smoke_client.py --executable dist/GenBox

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macOS
          path: dist/${{ env.APP_NAME }}
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Linux Build
  # ──────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Build with PyInstaller
        run: python build.py

      - name: Smoke test packaged client
        run: python scripts/smoke_client.py --executable dist/GenBox

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Linux-x64
          path: dist/${{ env.APP_NAME }}
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Create Release
  # ──────────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Windows-x64
          path: artifacts/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macOS
          path: artifacts/macos

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Linux-x64
          path: artifacts/linux

      - name: List artifacts
        run: find artifacts -type f

      - name: Rename artifacts for upload
        run: |
          mv "artifacts/macos/${{ env.APP_NAME }}" "artifacts/macos/${{ env.APP_NAME }}-macOS"
          mv "artifacts/linux/${{ env.APP_NAME }}" "artifacts/linux/${{ env.APP_NAME }}-Linux-x64"

      - name: Package Windows release
        run: |
          mkdir -p artifacts/release-windows
          cp "artifacts/windows/${{ env.APP_NAME }}.exe" artifacts/release-windows/
          cp docs/CLIENT-QUICKSTART.md artifacts/release-windows/README.md
          cp LICENSE artifacts/release-windows/
          cd artifacts/release-windows && zip -r ../${{ env.APP_NAME }}-Windows.zip .

      - name: Package macOS release
        run: |
          mkdir -p artifacts/release-macos
          cp "artifacts/macos/${{ env.APP_NAME }}-macOS" artifacts/release-macos/
          cp docs/CLIENT-QUICKSTART.md artifacts/release-macos/README.md
          cp LICENSE artifacts/release-macos/
          cd artifacts/release-macos && zip -r ../${{ env.APP_NAME }}-macOS.zip .

      - name: Package Linux release
        run: |
          mkdir -p artifacts/release-linux
          cp "artifacts/linux/${{ env.APP_NAME }}-Linux-x64" artifacts/release-linux/
          cp docs/CLIENT-QUICKSTART.md artifacts/release-linux/README.md
          cp LICENSE artifacts/release-linux/
          cd artifacts/release-linux && zip -r ../${{ env.APP_NAME }}-Linux-x64.zip .

      - name: Package Docker Compose release
        run: python scripts/package_release.py --output artifacts --docker-only

      - name: Generate release checksums
        run: |
          cd artifacts
          sha256sum \
            "${{ env.APP_NAME }}-Windows.zip" \
            "${{ env.APP_NAME }}-macOS.zip" \
            "${{ env.APP_NAME }}-Linux-x64.zip" \
            "${{ env.APP_NAME }}-Docker-Compose-"*.zip \
            windows/${{ env.APP_NAME }}.exe \
            macos/${{ env.APP_NAME }}-macOS \
            linux/${{ env.APP_NAME }}-Linux-x64 \
            > SHA256SUMS.txt

      - name: Select release notes
        id: rn
        shell: bash
        run: |
          f="release-notes-${{ github.ref_name }}-zh.md"
          [ -f "$f" ] || f="release-notes-${{ github.ref_name }}.md"
          [ -f "$f" ] || f="RELEASE_NOTES.md"
          echo "notes=$f" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create release first
          gh release create "${{ github.ref_name }}" \
            --title "${{ env.APP_NAME }} ${{ github.ref_name }}" \
            --notes-file "${{ steps.rn.outputs.notes }}" \
            --draft=false \
            --prerelease=false
          
          # Upload standalone executables first. Legacy updaters select the first
          # platform match, so ordering keeps them away from ZIP payloads.
          gh release upload "${{ github.ref_name }}" \
            "artifacts/windows/${{ env.APP_NAME }}.exe" \
            "artifacts/macos/${{ env.APP_NAME }}-macOS" \
            "artifacts/linux/${{ env.APP_NAME }}-Linux-x64"

          # Upload zip packages (recommended for first-time users)
          gh release upload "${{ github.ref_name }}" \
            "artifacts/${{ env.APP_NAME }}-Windows.zip" \
            "artifacts/${{ env.APP_NAME }}-macOS.zip" \
            "artifacts/${{ env.APP_NAME }}-Linux-x64.zip" \
            artifacts/${{ env.APP_NAME }}-Docker-Compose-*.zip \
            "artifacts/SHA256SUMS.txt"
