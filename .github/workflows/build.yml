name: Build Desktop Clients

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_all:
        description: 'Build all platforms'
        required: false
        default: 'true'
        type: boolean

env:
  APP_NAME: GenBox
  PYTHON_VERSION: '3.11'

jobs:
  # ──────────────────────────────────────────────────────────────
  # Windows Build
  # ──────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Windows-x64
          path: dist/${{ env.APP_NAME }}.exe
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # macOS Build
  # ──────────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macOS
          path: dist/${{ env.APP_NAME }}
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Linux Build
  # ──────────────────────────────────────────────────────────────
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Linux-x64
          path: dist/${{ env.APP_NAME }}
          retention-days: 7

  # ──────────────────────────────────────────────────────────────
  # Create Release
  # ──────────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Windows-x64
          path: artifacts/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macOS
          path: artifacts/macos

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Linux-x64
          path: artifacts/linux

      - name: List artifacts
        run: find artifacts -type f

      - name: Rename artifacts for upload
        run: |
          mv "artifacts/macos/${{ env.APP_NAME }}" "artifacts/macos/${{ env.APP_NAME }}-macOS"
          mv "artifacts/linux/${{ env.APP_NAME }}" "artifacts/linux/${{ env.APP_NAME }}-Linux-x64"

      - name: Package Windows release
        run: |
          mkdir -p artifacts/release-windows
          cp "artifacts/windows/${{ env.APP_NAME }}.exe" artifacts/release-windows/
          cp .env.example artifacts/release-windows/
          cp requirements.txt artifacts/release-windows/
          cp check_env.py artifacts/release-windows/
          cp start.bat artifacts/release-windows/
          cp README.md artifacts/release-windows/
          cd artifacts/release-windows && zip -r ../${{ env.APP_NAME }}-Windows.zip .

      - name: Package macOS release
        run: |
          mkdir -p artifacts/release-macos
          cp "artifacts/macos/${{ env.APP_NAME }}-macOS" artifacts/release-macos/
          cp .env.example artifacts/release-macos/
          cp requirements.txt artifacts/release-macos/
          cp check_env.py artifacts/release-macos/
          cp README.md artifacts/release-macos/
          cd artifacts/release-macos && zip -r ../${{ env.APP_NAME }}-macOS.zip .

      - name: Package Linux release
        run: |
          mkdir -p artifacts/release-linux
          cp "artifacts/linux/${{ env.APP_NAME }}-Linux-x64" artifacts/release-linux/
          cp .env.example artifacts/release-linux/
          cp requirements.txt artifacts/release-linux/
          cp check_env.py artifacts/release-linux/
          cp README.md artifacts/release-linux/
          cd artifacts/release-linux && zip -r ../${{ env.APP_NAME }}-Linux-x64.zip .

      - name: Package Docker Compose release
        run: |
          mkdir -p artifacts/release-docker
          cp docker-compose.yml artifacts/release-docker/
          cp .env.example artifacts/release-docker/.env
          cd artifacts/release-docker && zip -r ../${{ env.APP_NAME }}-Docker-Compose.zip .

      - name: Select release notes
        id: rn
        shell: bash
        run: |
          f="release-notes-${{ github.ref_name }}-zh.md"
          [ -f "$f" ] || f="release-notes-${{ github.ref_name }}.md"
          [ -f "$f" ] || f="RELEASE_NOTES.md"
          echo "notes=$f" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create release first
          gh release create "${{ github.ref_name }}" \
            --title "${{ env.APP_NAME }} ${{ github.ref_name }}" \
            --notes-file "${{ steps.rn.outputs.notes }}" \
            --draft=false \
            --prerelease=false
          
          # Upload zip packages (recommended for first-time users)
          gh release upload "${{ github.ref_name }}" \
            "artifacts/${{ env.APP_NAME }}-Windows.zip" \
            "artifacts/${{ env.APP_NAME }}-macOS.zip" \
            "artifacts/${{ env.APP_NAME }}-Linux-x64.zip" \
            "artifacts/${{ env.APP_NAME }}-Docker-Compose.zip"
          
          # Upload standalone executables (for advanced users)
          gh release upload "${{ github.ref_name }}" \
            "artifacts/windows/${{ env.APP_NAME }}.exe" \
            "artifacts/macos/${{ env.APP_NAME }}-macOS" \
            "artifacts/linux/${{ env.APP_NAME }}-Linux-x64"
