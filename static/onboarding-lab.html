<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>GenBox Onboarding Lab</title>
  <style>
    :root {
      color-scheme: dark;
      --lab-bg: #0b0d10;
      --lab-surface: #14181d;
      --lab-line: #2b343e;
      --lab-text: #f4f7fa;
      --lab-muted: #98a4b3;
      --app-bg: #eef3f8;
      --app-panel: rgba(255,255,255,.94);
      --app-surface: rgba(255,255,255,.88);
      --app-line: #d9e1e8;
      --app-text: #1b2530;
      --app-muted: #607080;
      --accent: #1677c8;
      --accent-soft: #e3f2ff;
      --success: #1f9d5a;
      --warning: #b7791f;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      overflow: hidden;
      background: var(--lab-bg);
      color: var(--lab-text);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    button, input, a, select { font: inherit; }
    button { cursor: pointer; }
    .lab { min-height: 100%; display: grid; grid-template-rows: auto 1fr; }
    .toolbar {
      min-height: 68px;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 12px 18px;
      border-bottom: 1px solid var(--lab-line);
      background: var(--lab-surface);
    }
    .identity { min-width: 240px; }
    .identity strong { display: block; font-size: 14px; }
    .identity span { display: flex; align-items: center; gap: 7px; margin-top: 4px; color: var(--lab-muted); font-size: 12px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: #37c978; box-shadow: 0 0 0 4px rgba(55,201,120,.12); }
    .controls { display: flex; flex: 1; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; }
    .segment { display: inline-flex; padding: 3px; border: 1px solid var(--lab-line); border-radius: 7px; background: #1a2027; }
    .segment button, .icon-button {
      min-height: 34px;
      border: 0;
      border-radius: 5px;
      background: transparent;
      color: var(--lab-muted);
      padding: 0 12px;
    }
    .segment button, .icon-button { display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
    .segment button svg, .icon-button svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .segment button[data-viewport] { width: 38px; padding: 0; }
    .segment button.active { background: #2a333d; color: var(--lab-text); }
    .icon-button { width: 36px; padding: 0; border: 1px solid var(--lab-line); font-size: 18px; }
    .segment button:focus-visible, .icon-button:focus-visible, .open-link:focus-visible { outline: 2px solid #4aa8ff; outline-offset: 2px; }
    .open-link {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      padding: 0 13px;
      border: 1px solid #326a99;
      border-radius: 6px;
      color: #bce0ff;
      text-decoration: none;
      white-space: nowrap;
    }
    .stage {
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      background-color: #0d1116;
      background-image: linear-gradient(#20262d 1px, transparent 1px), linear-gradient(90deg, #20262d 1px, transparent 1px);
      background-size: 24px 24px;
    }
    .viewport {
      width: min(100%, 1440px);
      height: 100%;
      min-height: 520px;
      overflow: hidden;
      border: 1px solid #39434d;
      border-radius: 8px;
      background: var(--app-bg);
      box-shadow: 0 22px 60px rgba(0,0,0,.38);
      transition: width .2s ease;
    }
    .viewport.mobile { width: 390px; max-width: 100%; }
    .app-preview { position: relative; width: 100%; height: 100%; min-height: 520px; overflow: hidden; background: var(--app-bg); color: var(--app-text); }
    .ghost-shell { position: absolute; inset: 0; display: grid; grid-template-columns: 78px 1fr; }
    .ghost-sidebar { padding: 18px 12px; border-right: 1px solid var(--app-line); background: rgba(255,255,255,.78); }
    .brand { width: 42px; height: 42px; margin: 0 auto 10px; }
    .brand svg { width: 100%; height: 100%; fill: none; stroke: var(--accent); stroke-width: 1.65; stroke-linecap: round; stroke-linejoin: round; }
    .nav-pip { width: 42px; height: 42px; display: grid; place-items: center; margin: 8px auto 0; border: 1px solid transparent; border-radius: 7px; color: #718091; font-size: 12px; }
    .nav-pip.active { border-color: #a9d5f8; background: var(--accent-soft); color: var(--accent); }
    .ghost-canvas { padding: 24px; }
    .ghost-head { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .ghost-title { width: 260px; height: 18px; border-radius: 4px; background: #dce5ed; }
    .ghost-actions { display: flex; gap: 8px; }
    .ghost-actions span { width: 76px; height: 30px; border: 1px solid var(--app-line); border-radius: 6px; background: #fff; }
    .ghost-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin-top: 20px; opacity: .72; }
    .ghost-card { min-height: 140px; border: 1px solid var(--app-line); border-radius: 8px; background: #fff; }
    .guide-overlay { position: absolute; inset: 0; z-index: 4; display: grid; place-items: center; padding: 22px; background: rgba(26,36,46,.48); backdrop-filter: blur(8px); }
    .guide-panel {
      width: min(1120px, 96%);
      max-height: calc(100% - 14px);
      overflow: auto;
      padding: 24px;
      border: 1px solid rgba(255,255,255,.82);
      border-radius: 8px;
      background: var(--app-panel);
      box-shadow: 0 24px 70px rgba(24,38,52,.24);
    }
    .guide-header { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .brandline { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .brandline svg { width: 32px; height: 32px; flex: none; fill: none; stroke: var(--accent); stroke-width: 1.65; stroke-linecap: round; stroke-linejoin: round; }
    .brandline b { display: block; color: var(--accent); font-size: 10px; letter-spacing: .16em; }
    .brandline strong { display: block; margin-top: 3px; font-size: 18px; }
    .guide-topbar { display: flex; align-items: center; gap: 8px; color: var(--app-muted); font-size: 11px; }
    .guide-topbar select { min-height: 34px; border: 1px solid var(--app-line); border-radius: 8px; background: #fff; color: var(--app-text); padding: 0 10px; }
    .intro { margin-top: 26px; }
    .eyebrow { color: var(--accent); font-size: 10px; font-weight: 800; letter-spacing: .16em; }
    h1 { margin: 10px 0 8px; font-size: 32px; line-height: 1.1; }
    .lead { margin: 0; max-width: 760px; color: var(--app-muted); font-size: 13px; line-height: 1.7; }
    .steps { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); margin-top: 28px; border-top: 1px solid var(--app-line); border-bottom: 1px solid var(--app-line); }
    .step { padding: 20px 22px 20px 0; }
    .step + .step { padding-left: 22px; border-left: 1px solid var(--app-line); }
    .step code { color: var(--accent); font-size: 11px; font-weight: 800; }
    .step strong { display: block; margin-top: 10px; font-size: 14px; }
    .step p { min-height: 58px; margin: 8px 0 12px; color: var(--app-muted); font-size: 12px; line-height: 1.6; }
    .guide-button { min-height: 34px; padding: 0 12px; border: 1px solid var(--app-line); border-radius: 8px; background: #fff; color: var(--app-text); font-size: 12px; }
    .guide-button.primary { border-color: var(--accent); background: var(--accent); color: #fff; }
    .section { margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--app-line); }
    .section h2 { margin: 6px 0; font-size: 22px; }
    .section p { margin: 0; color: var(--app-muted); font-size: 13px; line-height: 1.65; }
    .cap-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 12px; margin-top: 18px; }
    .project-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; margin-top: 18px; }
    .cap-card, .project-card, .chat-card { padding: 16px 18px; border: 1px solid var(--app-line); border-radius: 14px; background: var(--app-surface); }
    .cap-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
    .cap-head strong, .chat-card strong { font-size: 14px; }
    .badge { padding: 3px 8px; border-radius: 999px; background: #fff; color: var(--accent); font-size: 10px; font-weight: 700; letter-spacing: .08em; }
    .badge.planned { color: var(--warning); }
    .cap-card p { font-size: 12px; line-height: 1.6; }
    .project-card { display: grid; align-content: start; gap: 8px; }
    .project-card strong { font-size: 14px; }
    .project-card p { font-size: 12px; line-height: 1.6; }
    .project-note { display: flex; align-items: center; justify-content: space-between; gap: 16px; margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--app-line); color: var(--app-muted); font-size: 11px; line-height: 1.6; }
    .project-note span { max-width: 86ch; }
    .project-note a { flex: none; text-decoration: none; }
    .section-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
    .chat-layout { display: grid; grid-template-columns: minmax(0,.92fr) minmax(0,1.08fr); gap: 12px; margin-top: 18px; }
    .chat-copy small { display: block; margin-top: 10px; color: var(--app-muted); font-size: 11px; line-height: 1.6; }
    .chat-copy .section-actions { margin-top: 14px; }
    .chat-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; }
    .chat-card { display: grid; gap: 10px; }
    .chat-card ul { margin: 0; padding-left: 18px; color: var(--app-muted); font-size: 12px; line-height: 1.65; }
    .footer { display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 12px; margin-top: 24px; padding-top: 18px; border-top: 1px solid var(--app-line); }
    .footer span { color: var(--app-muted); text-align: center; font-size: 11px; }
    .viewport.mobile .ghost-shell { grid-template-columns: 1fr; }
    .viewport.mobile .ghost-sidebar { display: none; }
    .viewport.mobile .ghost-canvas { padding: 14px; }
    .viewport.mobile .ghost-grid { grid-template-columns: 1fr; }
    .viewport.mobile .guide-overlay { align-items: start; padding: 10px; overflow: auto; }
    .viewport.mobile .guide-panel { width: 100%; max-height: none; padding: 16px; }
    .viewport.mobile .guide-header, .viewport.mobile .chat-layout, .viewport.mobile .chat-grid, .viewport.mobile .cap-grid, .viewport.mobile .project-grid, .viewport.mobile .steps { grid-template-columns: 1fr; }
    .viewport.mobile .project-note { align-items: stretch; flex-direction: column; }
    .viewport.mobile .step { padding: 18px 0; }
    .viewport.mobile .step + .step { padding-left: 0; border-left: 0; border-top: 1px solid var(--app-line); }
    .viewport.mobile .step p { min-height: 0; }
    .viewport.mobile .footer { grid-template-columns: auto 1fr; }
    .viewport.mobile .footer span { display: none; }
    @media (max-width: 980px) {
      .cap-grid, .project-grid, .chat-grid { grid-template-columns: repeat(2, minmax(0,1fr)); }
      .chat-layout { grid-template-columns: 1fr; }
    }
    @media (max-width: 840px) {
      .toolbar { align-items: flex-start; flex-wrap: wrap; gap: 10px; }
      .identity { min-width: 0; flex: 1; }
      .controls { order: 3; width: 100%; justify-content: flex-start; }
      .stage { padding: 10px; }
      .open-link { font-size: 12px; }
    }
  </style>
</head>
<body>
  <main class="lab">
    <header class="toolbar">
      <div class="identity">
        <strong>GenBox Onboarding Lab</strong>
        <span><i class="dot" aria-hidden="true"></i><span id="labStatus">隔离预览 / 使用真实翻译表</span></span>
      </div>
      <div class="controls" aria-label="Preview controls">
        <div class="segment" aria-label="Interface language">
          <button type="button" data-lang="zh-CN" class="active">中文</button>
          <button type="button" data-lang="en">English</button>
        </div>
        <div class="segment" aria-label="Preview viewport">
          <button type="button" data-viewport="desktop" class="active" title="桌面预览" aria-label="桌面预览"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M8 22h8M12 18v4"/></svg></button>
          <button type="button" data-viewport="mobile" title="手机预览" aria-label="手机预览"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="7" y="2" width="10" height="20" rx="2"/><path d="M11 18h2"/></svg></button>
        </div>
        <button class="icon-button" id="reload" type="button" title="重置预览" aria-label="重置预览"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11a8 8 0 1 0-2.3 5.7"/><path d="M20 4v7h-7"/></svg></button>
      </div>
      <a class="open-link" id="openApp" href="/?lang=zh-CN#/dashboard" target="_blank" rel="noopener">打开真实应用</a>
    </header>
    <section class="stage" aria-label="Onboarding preview">
      <div class="viewport" id="viewport">
        <div class="app-preview">
          <div class="ghost-shell" aria-hidden="true">
            <aside class="ghost-sidebar">
              <div class="brand"><svg viewBox="0 0 32 32"><path d="M16 3 27 9.5v13L16 29 5 22.5v-13Z"/><path d="m5 9.5 11 6.5 11-6.5M16 16v13"/><circle cx="16" cy="16" r="2.2"/></svg></div>
              <div class="nav-pip">01</div><div class="nav-pip">02</div><div class="nav-pip">03</div><div class="nav-pip">04</div><div class="nav-pip active">05</div>
            </aside>
            <div class="ghost-canvas">
              <div class="ghost-head"><div class="ghost-title"></div><div class="ghost-actions"><span></span><span></span></div></div>
              <div class="ghost-grid"><div class="ghost-card"></div><div class="ghost-card"></div><div class="ghost-card"></div></div>
            </div>
          </div>
          <div class="guide-overlay">
            <section class="guide-panel" aria-labelledby="guideTitle">
              <div class="guide-header">
                <div class="brandline">
                  <svg viewBox="0 0 32 32"><path d="M16 3 27 9.5v13L16 29 5 22.5v-13Z"/><path d="m5 9.5 11 6.5 11-6.5M16 16v13"/><circle cx="16" cy="16" r="2.2"/></svg>
                  <div><b data-key="onboarding.brand_kicker"></b><strong data-key="onboarding.title"></strong></div>
                </div>
                <div class="guide-topbar"><span data-key="language.select_label"></span><select aria-label="Language"><option>ZH / EN</option></select></div>
              </div>
              <section class="intro">
                <div class="eyebrow" data-key="nav.guide"></div>
                <h1 id="guideTitle" data-key="onboarding.title"></h1>
                <p class="lead" data-key="onboarding.subtitle"></p>
                <div class="steps">
                  <article class="step"><code>01</code><strong data-key="onboarding.step_1_title"></strong><p data-key="onboarding.step_1_desc"></p><button class="guide-button primary" data-key="onboarding.action_models"></button></article>
                  <article class="step"><code>02</code><strong data-key="onboarding.step_2_title"></strong><p data-key="onboarding.step_2_desc"></p><button class="guide-button" data-key="onboarding.action_gallery"></button></article>
                  <article class="step"><code>03</code><strong data-key="onboarding.step_3_title"></strong><p data-key="onboarding.step_3_desc"></p><button class="guide-button" data-key="nav.video"></button></article>
                </div>
              </section>
              <section class="section">
                <div class="eyebrow">02 / CAPABILITIES</div>
                <h2 data-key="onboarding.capability_title"></h2>
                <p data-key="onboarding.capability_desc"></p>
                <div class="cap-grid">
                  <article class="cap-card"><div class="cap-head"><strong data-key="onboarding.capability_image_title"></strong><span class="badge" data-key="onboarding.capability_ready"></span></div><p data-key="onboarding.capability_image_desc"></p></article>
                  <article class="cap-card"><div class="cap-head"><strong data-key="onboarding.capability_editing_title"></strong><span class="badge planned" data-key="onboarding.capability_planned"></span></div><p data-key="onboarding.capability_editing_desc"></p></article>
                  <article class="cap-card"><div class="cap-head"><strong data-key="onboarding.capability_video_title"></strong><span class="badge" data-key="onboarding.capability_ready"></span></div><p data-key="onboarding.capability_video_desc"></p></article>
                  <article class="cap-card"><div class="cap-head"><strong data-key="onboarding.capability_media_title"></strong><span class="badge" data-key="onboarding.capability_ready"></span></div><p data-key="onboarding.capability_media_desc"></p></article>
                  <article class="cap-card"><div class="cap-head"><strong data-key="onboarding.capability_prompt_title"></strong><span class="badge" data-key="onboarding.capability_ready"></span></div><p data-key="onboarding.capability_prompt_desc"></p></article>
                  <article class="cap-card"><div class="cap-head"><strong data-key="onboarding.capability_extensions_title"></strong><span class="badge" data-key="onboarding.capability_ready"></span></div><p data-key="onboarding.capability_extensions_desc"></p></article>
                </div>
                <div class="section-actions"><button class="guide-button" data-key="onboarding.manage_all"></button><button class="guide-button" data-key="onboarding.action_dashboard"></button></div>
              </section>
              <section class="section">
                <div class="eyebrow">03 / CHATGPT2API</div>
                <h2 data-key="onboarding.chatgpt_intro_title"></h2>
                <p data-key="onboarding.chatgpt_intro_desc"></p>
                <div class="project-grid">
                  <article class="project-card"><strong data-key="onboarding.chatgpt_intro_api_title"></strong><p data-key="onboarding.chatgpt_intro_api_desc"></p></article>
                  <article class="project-card"><strong data-key="onboarding.chatgpt_intro_studio_title"></strong><p data-key="onboarding.chatgpt_intro_studio_desc"></p></article>
                  <article class="project-card"><strong data-key="onboarding.chatgpt_intro_ops_title"></strong><p data-key="onboarding.chatgpt_intro_ops_desc"></p></article>
                  <article class="project-card"><strong data-key="onboarding.chatgpt_intro_host_title"></strong><p data-key="onboarding.chatgpt_intro_host_desc"></p></article>
                </div>
                <div class="project-note"><span data-key="onboarding.chatgpt_intro_source"></span><a class="guide-button" href="https://github.com/yukkcat/chatgpt2api" target="_blank" rel="noopener noreferrer" data-key="onboarding.chatgpt_intro_project"></a></div>
              </section>
              <section class="section">
                <div class="eyebrow">04 / CONNECT TO GENBOX</div>
                <div class="chat-layout">
                  <div class="chat-copy">
                    <h2 data-key="onboarding.chat_title"></h2>
                    <p data-key="onboarding.chat_desc"></p>
                    <small data-key="onboarding.chat_meta"></small>
                    <div class="section-actions"><button class="guide-button primary" data-key="onboarding.action_extensions"></button></div>
                  </div>
                  <div class="chat-grid">
                    <article class="chat-card"><span class="badge" data-key="onboarding.chat_available_label"></span><strong data-key="onboarding.chat_available_title"></strong><ul><li data-key="onboarding.chat_available_1"></li><li data-key="onboarding.chat_available_2"></li><li data-key="onboarding.chat_available_3"></li><li data-key="onboarding.chat_available_4"></li><li data-key="onboarding.chat_available_5"></li></ul></article>
                    <article class="chat-card"><span class="badge planned" data-key="onboarding.chat_planned_label"></span><strong data-key="onboarding.chat_planned_title"></strong><ul><li data-key="onboarding.chat_planned_1"></li><li data-key="onboarding.chat_planned_2"></li><li data-key="onboarding.chat_planned_3"></li><li data-key="onboarding.chat_planned_4"></li></ul></article>
                  </div>
                </div>
              </section>
              <footer class="footer"><button class="guide-button" data-key="common.skip"></button><span data-key="onboarding.footer_hint"></span><button class="guide-button primary" data-key="onboarding.finish"></button></footer>
            </section>
          </div>
        </div>
      </div>
    </section>
  </main>
  <script src="/static/js/i18n.js?v=6"></script>
  <script>
    (function () {
      var state = { lang: 'zh-CN', viewport: 'desktop' };
      var viewport = document.getElementById('viewport');
      var openApp = document.getElementById('openApp');

      function text(key) {
        var table = window.GenBoxI18n && window.GenBoxI18n.messages;
        var entry = table && table[key];
        return entry ? (entry[state.lang] || entry['zh-CN'] || key) : key;
      }

      function render() {
        document.documentElement.lang = state.lang;
        document.querySelectorAll('[data-key]').forEach(function (node) { node.textContent = text(node.getAttribute('data-key')); });
        document.getElementById('labStatus').textContent = state.lang === 'en' ? 'Isolated preview / live translation table' : '隔离预览 / 使用真实翻译表';
        openApp.textContent = state.lang === 'en' ? 'Open live app' : '打开真实应用';
        openApp.href = '/?lang=' + encodeURIComponent(state.lang) + '#/dashboard';
      }

      document.querySelectorAll('[data-lang]').forEach(function (button) {
        button.addEventListener('click', function () {
          state.lang = button.getAttribute('data-lang');
          document.querySelectorAll('[data-lang]').forEach(function (item) { item.classList.toggle('active', item === button); });
          render();
        });
      });
      document.querySelectorAll('[data-viewport]').forEach(function (button) {
        button.addEventListener('click', function () {
          state.viewport = button.getAttribute('data-viewport');
          document.querySelectorAll('[data-viewport]').forEach(function (item) { item.classList.toggle('active', item === button); });
          viewport.classList.toggle('mobile', state.viewport === 'mobile');
        });
      });
      document.getElementById('reload').addEventListener('click', function () {
        state.lang = 'zh-CN';
        state.viewport = 'desktop';
        document.querySelectorAll('[data-lang]').forEach(function (item) { item.classList.toggle('active', item.getAttribute('data-lang') === state.lang); });
        document.querySelectorAll('[data-viewport]').forEach(function (item) { item.classList.toggle('active', item.getAttribute('data-viewport') === state.viewport); });
        viewport.classList.remove('mobile');
        render();
      });
      render();
    })();
  </script>
</body>
</html>
