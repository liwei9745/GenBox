const items=[['dashboard','\u7cfb\u7edf\u770b\u677f'],['image','\u751f\u56fe'],['video','\u751f\u89c6\u9891'],['gallery','\u5a92\u4f53\u5e93'],['history','\u5386\u53f2'],['extension','\u6269\u5c55\u529f\u80fd'],['settings','\u6a21\u578b\u8bbe\u7f6e'],['prompt','\u63d0\u793a\u8bcd\u4f18\u5316'],['theme','\u4e3b\u9898\u8bbe\u7f6e'],['log','\u67e5\u770b\u65e5\u5fd7'],['refresh','\u5237\u65b0\u9875\u9762']];const options=[['a','\u65b9\u6848 A','Apple Mono','\u6781\u7b80\u7ec6\u7ebf\u3001\u514b\u5236\u7559\u767d\uff0c\u6700\u63a5\u8fd1 macOS \u7cfb\u7edf\u5de5\u5177\u611f\u3002'],['b','\u65b9\u6848 B','Circuit Precision','\u76f4\u7ebf\u5207\u89d2\u3001\u8282\u70b9\u7ed3\u6784\uff0c\u79d1\u6280\u4e0e\u5de5\u7a0b\u5c5e\u6027\u6700\u5f3a\u3002'],['c','方案 C · 默认','Soft Glass','玻璃流光与柔和线性图标，作为 GenBox 默认导航视觉。'],['d','方案 D','Fluent Air','借鉴 Fluent 的通透层级与清晰状态，蓝色空气感更适合工具看板。'],['e','方案 E','Material Prism','借鉴 Material 的色彩角色与圆润容器，识别直观且对新手友好。'],['f','方案 F','Creative Spectrum','借鉴创作工具的分区色彩，用紫、粉、橙建立功能记忆。'],['g','方案 G','Cloud Jade','青绿色云端效率风格，安静、清爽，适合网络与同步场景。'],['h','方案 H','Aurora Link','蓝青双色链路语言，兼顾腾讯式轻盈效率和 GenBox 网络特征。']];const dockPresets=[['glass','Soft Glass','透明玻璃、蓝紫流光，现代且更有 GenBox 识别度。'],['apple','Apple Mono','\u5927\u7559\u767d\u4e0e macOS \u5f0f\u78e8\u7802\u5bb9\u5668\uff0c\u5b89\u9759\u3001\u9ad8\u7ea7\u3001\u6700\u901a\u7528\u3002'],['circuit','Circuit Precision','\u8282\u70b9\u5207\u89d2\u548c\u7cbe\u5bc6\u8fb9\u6846\uff0c\u504f\u5de5\u7a0b\u63a7\u5236\u53f0\u8d28\u611f\u3002'],['floating','Floating Tiles','\u6bcf\u4e2a\u529f\u80fd\u662f\u72ec\u7acb\u60ac\u6d6e\u78c1\u8d34\uff0c\u5c42\u6b21\u66f4\u6e05\u695a\u3001\u70b9\u51fb\u76ee\u6807\u66f4\u5927\u3002'],['ribbon','Studio Ribbon','\u50cf\u521b\u4f5c\u8f6f\u4ef6\u7684\u5de5\u5177\u5e26\uff0c\u56fe\u6807\u4e0b\u6709\u6781\u77ed\u540d\u79f0\uff0c\u5bf9\u5c0f\u767d\u66f4\u53cb\u597d\u3002']];const logos=[['logo-aperture','Aperture'],['logo-box','GenBox Cube'],['logo-flow','Flow Link'],['logo-core','AI Core'],['logo-media','Media Box'],['logo-gb','GB Monogram']];let selectedLogo='logo-box';let selectedDock='glass';const icon=id=>'<span class="ico"><svg aria-hidden="true"><use href="#'+id+'"/></svg></span>';function render(){document.getElementById('logoChooser').innerHTML=logos.map(x=>'<button type="button" class="logo-choice '+(x[0]===selectedLogo?'active':'')+'" data-logo="'+x[0]+'">'+icon(x[0])+'<span>'+x[1]+'</span></button>').join('');document.getElementById('logoChooser').querySelectorAll('[data-logo]').forEach(button=>button.addEventListener('click',()=>selectLogo(button.dataset.logo)));document.getElementById('grid').innerHTML=options.map(o=>'<section class="option '+o[0]+'"><div class="option-head"><span class="tag">'+o[2]+'</span><h2>'+o[1]+'</h2><p>'+o[3]+'</p></div><div class="demo"><aside class="side"><div class="brand clickable" onclick="openLogoPreview()">'+icon(selectedLogo)+'<span class="brand-word">GenBox</span></div><nav class="nav">'+items.map((x,i)=>'<div class="item '+(i===5?'active':'')+'">'+icon(x[0])+'<span>'+x[1]+'</span></div>').join('')+'</nav></aside><main class="main"><div class="canvas"><h3>\u6269\u5c55\u529f\u80fd\u670d\u52a1\u7ba1\u7406\u63a7\u5236\u53f0</h3><p>\u56fe\u6807\u627f\u62c5\u5bfc\u822a\u8bc6\u522b\uff0c\u754c\u9762\u4fdd\u6301\u5b89\u9759\u3001\u7cbe\u5bc6\u548c\u4e00\u81f4\u3002</p></div><div class="dock">'+items.slice(0,10).map(x=>icon(x[0])).join('')+'</div></main></div></section>').join('');renderDock()}
function dockMarkup(preset){const short=['看板','生图','视频','媒体','历史','扩展','模型','提示','主题','日志'];return '<article class="dock-card"><div class="dock-card-head"><strong>'+preset[1]+'</strong><span>'+preset[2]+'</span></div><div class="dock-card-stage"><div class="dock-name">当前项：扩展功能</div><div class="dock-preview '+preset[0]+'">'+items.slice(0,10).map((x,i)=>'<div class="dock-app '+(i===5?'active':'')+'" title="'+x[1]+'" data-short="'+short[i]+'">'+icon(x[0])+'</div>').join('')+'</div></div></article>'}
function renderDock(){document.getElementById('dockGallery').innerHTML=dockPresets.map(dockMarkup).join('')}
function selectLogo(id){selectedLogo=id;render()}function selectDock(id){selectedDock=id;renderDock()}function openLogoPreview(){document.getElementById('modalLogo').innerHTML=icon(selectedLogo)+'<strong>GenBox</strong>';document.getElementById('previewModal').classList.add('open')}function closeLogoPreview(){document.getElementById('previewModal').classList.remove('open')}render();
</script></body></html>
